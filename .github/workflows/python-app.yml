name: 🤖 Bot Automático - Buscar Descargar Publicar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  bot-completo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install -q yt-dlp requests
      
      - name: Ejecutar Bot Automático
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: python bot_automatico.py
      
      - name: Guardar datos y logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-data-hora-${{ github.run_number }}
          path: |
            data/
            ${{ runner.temp }}/bot_noticias/
          retention-days: 7
