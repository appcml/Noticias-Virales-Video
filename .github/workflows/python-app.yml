name: Python Tests

on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # ¡Con comillas!
          cache: 'pip'
          
      - name: Install system dependencies (para Tkinter)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # py2exe se ignorará automáticamente en Linux
          
      - name: Run tests
        run: |
          # Si tienes tests con pytest:
          pytest tests/ -v || echo "No tests found"
          
      - name: Build with PyInstaller (opcional)
        run: |
          pyinstaller --onefile --windowed Youtube_Downloader.py || echo "Build completed with warnings"
